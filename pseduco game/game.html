<!DOCTYPE html>
<html>
<head>
    <title>Simple Sudoku</title>
    <style>
        table {
            border-collapse: collapse;
            margin: 20px auto;
        }

        td {
            border: 1px solid black;
        }

        input {
            width: 40px;
            height: 40px;
            text-align: center;
            font-size: 20px;
            border: none;
        }

        .fixed {
            background-color: lightgray;
            font-weight: bold;
        }

        button {
            display: block;
            margin: 10px auto;
            padding: 10px;
        }
    </style>
</head>
<body>

<h2 align="center">Sudoku Game</h2>

<table id="board"></table>

<button onclick="checkAnswer()">Check Answer</button>

<p id="result" align="center"></p>

<script>
const puzzle = [
 [5,3,0,0,7,0,0,0,0],
 [6,0,0,1,9,5,0,0,0],
 [0,9,8,0,0,0,0,6,0],
 [8,0,0,0,6,0,0,0,3],
 [4,0,0,8,0,3,0,0,1],
 [7,0,0,0,2,0,0,0,6],
 [0,6,0,0,0,0,2,8,0],
 [0,0,0,4,1,9,0,0,5],
 [0,0,0,0,8,0,0,7,9]
];

const solution = [
 [5,3,4,6,7,8,9,1,2],
 [6,7,2,1,9,5,3,4,8],
 [1,9,8,3,4,2,5,6,7],
 [8,5,9,7,6,1,4,2,3],
 [4,2,6,8,5,3,7,9,1],
 [7,1,3,9,2,4,8,5,6],
 [9,6,1,5,3,7,2,8,4],
 [2,8,7,4,1,9,6,3,5],
 [3,4,5,2,8,6,1,7,9]
];

const board = document.getElementById("board");

for(let i=0;i<9;i++){
    let row = document.createElement("tr");

    for(let j=0;j<9;j++){
        let cell = document.createElement("td");
        let input = document.createElement("input");

        if(puzzle[i][j] !== 0){
            input.value = puzzle[i][j];
            input.disabled = true;
            input.className = "fixed";
        }

        input.id = i + "-" + j;

        cell.appendChild(input);
        row.appendChild(cell);
    }

    board.appendChild(row);
}

function checkAnswer(){
    let correct = true;

    for(let i=0;i<9;i++){
        for(let j=0;j<9;j++){
            let value = document.getElementById(i+"-"+j).value;

            if(Number(value) !== solution[i][j]){
                correct = false;
            }
        }
    }

    document.getElementById("result").innerHTML =
        correct ? "You Win!" : "Wrong Answer!";
}
</script>

</body>
</html>
