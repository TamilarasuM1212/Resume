<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENT DETAILS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    
    <div class="container mt-5">
        <h1 class="mb-4">Student Table</h1>
        
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="mb-3">
                    <label class="form-label">Full Name:</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>

                <div class="mb-3">
                    <label for="dept" class="form-label">Department:</label>
                    <input type="text" class="form-control" id="dept" name="dept" required>
                </div>
                    
                <div class="mb-3">
                    <label class="form-label">Email Address:</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone Number:</label>
                    <input type="tel" class="form-control" id="phone" name="phone">
                </div>
                
                <button type="button" class="btn btn-primary w-100" id="saveBtn" onclick="saveStudent()">Submit</button>
            </div>
            
            <div class="col-md-8">
                <table id="studentTable" class="table table-bordered table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>
    
<script>
    var editRow = null;

    function saveStudent() {
        var name = document.getElementById("name").value;
        var dept = document.getElementById("dept").value;
        var email = document.getElementById("email").value;
        var phone = document.getElementById("phone").value;

        if(name == "" || dept == "" || email == "" || phone == "") {
            alert("Enter all details");
            return;
        }

        if(editRow == null) {
            // Target the tbody to keep Bootstrap styling intact
            var table = document.getElementById("studentTable").getElementsByTagName('tbody')[0];
            var row = table.insertRow();

            row.insertCell(0).innerHTML = name;
            row.insertCell(1).innerHTML = dept;
            row.insertCell(2).innerHTML = email;
            row.insertCell(3).innerHTML = phone;

            // Added basic Bootstrap button classes (btn, btn-warning, btn-danger)
            row.insertCell(4).innerHTML =
            "<button class='btn btn-warning btn-sm me-2' onclick='editStudent(this)'>Edit</button> " +
            "<button class='btn btn-danger btn-sm' onclick='deleteStudent(this)'>Delete</button>";
        } 
        else {
            editRow.cells[0].innerHTML = name;
            editRow.cells[1].innerHTML = dept;
            editRow.cells[2].innerHTML = email;
            editRow.cells[3].innerHTML = phone;

            editRow = null;
            var saveBtn = document.getElementById("saveBtn");
            saveBtn.innerHTML = "Submit";
            saveBtn.className = "btn btn-primary w-100"; // Reset button style
        }

        clearData();
    }

    function editStudent(btn) {
        editRow = btn.parentNode.parentNode;

        document.getElementById("name").value = editRow.cells[0].innerHTML;
        document.getElementById("dept").value = editRow.cells[1].innerHTML;
        document.getElementById("email").value = editRow.cells[2].innerHTML;
        document.getElementById("phone").value = editRow.cells[3].innerHTML;

        var saveBtn = document.getElementById("saveBtn");
        saveBtn.innerHTML = "Update";
        saveBtn.className = "btn btn-success w-100"; // Change button to green for updates
    }

    function deleteStudent(btn) {
        var row = btn.parentNode.parentNode;

        if(confirm("Delete this record?")) {
            row.remove();
        }
    }

    function clearData() {
        document.getElementById("name").value = "";
        document.getElementById("dept").value = "";
        document.getElementById("email").value = "";
        document.getElementById("phone").value = "";
    }
</script>

</body>
</html>
